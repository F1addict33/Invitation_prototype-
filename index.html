*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {

  --white-60:    rgba(255,255,255,0.60);

  --white-10:    rgba(255,255,255,0.07);

  --rule-bright: rgba(74,174,224,0.55);
}

html { background: var(--navy-deep); }

body {
  font-family: 'Crimson Pro', Georgia, serif;

html[lang="ar"] .detail-kicker,
html[lang="ar"] .venue-label,
html[lang="ar"] .video-label,
html[lang="ar"] .contact-kicker,
html[lang="ar"] .maps-link {

.page {
  max-width: 680px;
  margin: 0 auto;
}

/* ── LANGUAGE TOGGLE ── */
.lang-toggle-wrap {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 1.25rem;
}

  justify-content: flex-start;
}

.lang-btn {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  background: transparent;
  border: 1px solid var(--cyan);
  padding: 9px 22px;
  cursor: pointer;
  transition: background 0.25s, color 0.25s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lang-btn:hover {
  background: var(--cyan);
  color: var(--navy-deep);
}

.lang-btn svg {
  width: 13px;
  height: 13px;
  fill: currentColor;
  flex-shrink: 0;

  font-family: 'Noto Naskh Arabic', serif;
  letter-spacing: 0;
  font-size: 13px;

/* ── REVEAL ── */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes rise {
  to { opacity: 1; transform: none; }
}

.rule {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2rem 0;

.rule::before,
.rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule-bright);
}
.rule-diamond {
  width: 5px;
  height: 5px;
  background: var(--cyan);
  transform: rotate(45deg);
  flex-shrink: 0;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  border: 1px solid var(--rule);
  border-bottom: none;
  text-align: center;
  padding: 3.5rem 2rem 0;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 520px;
  height: 520px;
  border-radius: 50%;
  border: 60px solid rgba(74,174,224,0.055);
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 380px;
  height: 380px;
  border-radius: 50%;
  border: 30px solid rgba(74,174,224,0.04);
  pointer-events: none;
}

.crest {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 2px solid var(--cyan);
  box-shadow: 0 0 0 1px rgba(74,174,224,0.18), 0 0 28px rgba(74,174,224,0.12);
  overflow: hidden;
  margin: 0 auto 1.75rem;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
}
.crest img {
  width: 80px;
  height: 80px;
  object-fit: contain;
}

.school-name {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 4.5px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 2.75rem;
  position: relative;
  z-index: 1;
}

.presents {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--white-60);
  margin-bottom: 1rem;
}

.event-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 7vw, 56px);
  font-weight: 400;
  line-height: 1.08;
  color: var(--white);
  letter-spacing: -0.5px;
}

.event-year {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(20px, 4vw, 30px);
  color: var(--cyan);
  font-weight: 400;
  margin-top: 0.3rem;
}

html[lang="ar"] .event-year {
  font-family: 'Amiri', serif;
  font-style: normal;
}

.grades-line {
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  color: var(--cyan-faint);
  letter-spacing: 0.5px;
  margin-top: 2rem;
  padding-bottom: 2.75rem;
}

/* ── INVITE BODY ── */
.invite-body {
  background: var(--navy);
  border: 1px solid var(--rule);
  border-top: none;
  border-bottom: none;
  padding: 0 3rem 2.5rem;
  text-align: center;
}

.cordially {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 19px;
  color: var(--white-90);
  line-height: 1.8;
  max-width: 460px;
  margin: 0 auto;
}

/* ── VIDEO ── */
.video-wrap {
  background: var(--navy);
  border: 1px solid var(--rule);
  border-top: none;
  border-bottom: none;
  padding: 0 2.5rem 2.5rem;
}

.video-label {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  text-align: center;
  margin-bottom: 1rem;
}

.video-frame {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 1px solid var(--rule-bright);
  overflow: hidden;
  background: var(--navy-deep);
}

.video-frame video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── DETAILS ── */
.details-section {
  background: var(--navy);
  border: 1px solid var(--rule);
  border-top: none;
  border-bottom: none;
  padding: 0 2.5rem 2.5rem;
}

.detail-row {
  display: grid;
  grid-template-columns: 1fr 1px 1fr 1px 1fr;
  text-align: center;
}

.detail-divider {
  background: var(--rule-bright);
  margin: 0.5rem 0;
}

.detail-item { padding: 1rem 1.25rem; }

.detail-kicker {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 0.6rem;
}

.detail-value {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--white);
  line-height: 1.35;
}

html[lang="ar"] .detail-value {
  font-family: 'Amiri', serif;
}

.detail-sub {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--white-60);
  margin-top: 0.3rem;
}

/* ── VENUE ── */
.venue-section {
  background: var(--navy-deep);
  border: 1px solid var(--rule);
  border-top: none;
  border-bottom: none;
  padding: 3rem 2.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.venue-section::before {
  content: '';
  position: absolute;
  bottom: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  border-radius: 50%;
  border: 80px solid rgba(74,174,224,0.04);
  pointer-events: none;
}

.venue-label {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 1.25rem;
}

.venue-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 0.75rem;
}

.venue-rule {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1.5rem 0;
}
.venue-rule::before,
.venue-rule::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(74,174,224,0.18);
}
.venue-rule-diamond {
  width: 5px;
  height: 5px;
  background: var(--cyan);
  transform: rotate(45deg);
  flex-shrink: 0;
}

.venue-address {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--cyan-faint);
  line-height: 1.65;
  margin-bottom: 2.25rem;
  position: relative;
  z-index: 1;
}

.maps-link {
  display: inline-block;
  font-family: 'Tenor Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  text-decoration: none;
  border: 1px solid var(--cyan);
  padding: 11px 30px;
  transition: background 0.25s, color 0.25s;
  position: relative;
  z-index: 1;
}
.maps-link:hover {
  background: var(--cyan);
  color: var(--navy-deep);
}

/* ── RSVP ── */
.rsvp-section {
  background: var(--navy-mid);
  border: 1px solid var(--rule);
  border-top: none;
  border-bottom: none;
  padding: 2.75rem 2.5rem;
  text-align: center;
}

.rsvp-heading {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 26px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 0.75rem;
}

.rsvp-body {
  font-family: 'Crimson Pro', serif;
  font-size: 17px;
  color: var(--white-60);
  line-height: 1.75;
  margin-bottom: 2rem;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.contact-grid {
  display: flex;
  gap: 2px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 1.75rem;
}

.contact-item {
  background: var(--white-10);
  border: 1px solid var(--rule);
  padding: 0.875rem 1.75rem;
  min-width: 200px;
}

.contact-kicker {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 0.4rem;
}

.contact-val {
  font-family: 'Crimson Pro', serif;
  font-size: 15px;
  color: var(--white-90);
}

.rsvp-note {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--white-60);
}

.rsvp-note strong {
  color: var(--cyan-faint);
  font-style: normal;
  font-weight: 400;
}

/* ── FOOTER ── */
.footer {
  background: var(--navy);
  border: 1px solid var(--rule);
  padding: 1.75rem 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.footer-school {
  display: flex;
  align-items: center;
  gap: 0.875rem;
}

.footer-crest {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--cyan);
  overflow: hidden;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.footer-crest img {
  width: 30px;
  height: 30px;
  object-fit: contain;
}

.footer-school-text p:first-child {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white-90);
}

html[lang="ar"] .footer-school-text p:first-child {
  font-family: 'Noto Naskh Arabic', serif;
  letter-spacing: 0;
  font-size: 13px;
}

.footer-school-text p:last-child {
  font-family: 'Crimson Pro', serif;
  font-size: 12px;
  color: var(--white-60);
  margin-top: 2px;
  font-style: italic;
}

.footer-credit {
  font-family: 'Crimson Pro', serif;
  font-size: 12px;
  color: var(--white-60);
  text-align: right;
  font-style: italic;
  line-height: 1.7;
}

html[lang="ar"] .footer-credit {
  font-family: 'Amiri', serif;
  font-style: normal;
  text-align: left;
}

/* ── TRANSITION ── */
.translating * {
  transition: opacity 0.25s ease;
  opacity: 0.4;
}

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  body { padding: 0 0 3rem; }
  .header { padding: 2.5rem 1.5rem 0; }
  .invite-body { padding: 0 1.5rem 2rem; }
  .video-wrap { padding: 0 1.25rem 2rem; }
  .details-section { padding: 0 1rem 2rem; }
  .venue-section, .rsvp-section { padding: 2rem 1.5rem; }
  .footer { padding: 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
  .footer-credit { text-align: left; }
  .detail-row { grid-template-columns: 1fr; }
  .detail-divider { display: none; }
  .detail-item { padding: 0.75rem 0; border-bottom: 1px solid var(--rule); }
  .detail-item:last-child { border-bottom: none; }
  .cordially { font-size: 17px; }
  .header::before, .header::after { display: none; }
}
</style>
</head>
<body>
<div class="page">

  <!-- Language Toggle -->
  <div class="lang-toggle-wrap reveal" style="animation-delay:0s">
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
      </svg>
      <span id="lang-btn-text">عربي</span>
    </button>
  </div>

  <div class="header reveal" style="animation-delay:0.05s">
    <div class="crest">
      <img id="school-logo" src="" alt="NVIS crest">
    </div>
    <p class="school-name" id="school-name-el"></p>
    <p class="presents" id="presents-el"></p>
    <h1 class="event-title" id="event-title-el"></h1>
    <p class="event-year" id="event-year-el"></p>
    <div class="rule" style="margin-top:2rem;margin-bottom:0">
      <div class="rule-diamond"></div>
    </div>
    <p class="grades-line" id="grades-line-el"></p>
  </div>

  <div class="invite-body reveal" style="animation-delay:0.12s">
    <div class="rule"><div class="rule-diamond"></div></div>
    <p class="cordially" id="invite-body-el"></p>
    <div class="rule"><div class="rule-diamond"></div></div>
  </div>

  <div class="video-wrap reveal" id="video-section" style="animation-delay:0.18s">
    <p class="video-label" id="video-label-el"></p>
    <div class="video-frame">
      <video id="grad-video" controls autoplay muted loop playsinline></video>
    </div>
    <div class="rule" style="margin-bottom:0"><div class="rule-diamond"></div></div>
  </div>

  <div class="details-section reveal" style="animation-delay:0.24s">
    <div class="detail-row">
      <div class="detail-item">
        <p class="detail-kicker" id="date-label-el"></p>
        <p class="detail-value" id="val-date"></p>
      </div>
      <div class="detail-divider"></div>
      <div class="detail-item">
        <p class="detail-kicker" id="time-label-el"></p>
        <p class="detail-value" id="val-time"></p>
        <p class="detail-sub" id="val-doors"></p>
      </div>
      <div class="detail-divider"></div>
      <div class="detail-item">
        <p class="detail-kicker" id="attire-label-el"></p>
        <p class="detail-value" id="attire-val-el"></p>
        <p class="detail-sub" id="attire-sub-el"></p>
      </div>
    </div>
    <div class="rule" style="margin-bottom:0"><div class="rule-diamond"></div></div>
  </div>

  <div class="venue-section reveal" style="animation-delay:0.30s">
    <p class="venue-label" id="venue-label-el"></p>
    <p class="venue-name" id="venue-name-el"></p>
    <div class="venue-rule"><div class="venue-rule-diamond"></div></div>
    <p class="venue-address" id="venue-addr-el"></p>
    <a class="maps-link" id="maps-link" target="_blank" href="https://www.google.com/maps/place/New+Vision+Schools+-+Al+Wadi/@24.7926968,46.6803229,17z"></a>
  </div>

  <div class="rsvp-section reveal" style="animation-delay:0.36s">
    <div class="rule"><div class="rule-diamond"></div></div>
    <h2 class="rsvp-heading" id="rsvp-heading-el"></h2>
    <p class="rsvp-body" id="rsvp-body-el"></p>
    <div class="contact-grid">
      <div class="contact-item">
        <p class="contact-kicker" id="email-label-el"></p>
        <p class="contact-val" id="contact-email-el"></p>
      </div>
      <div class="contact-item">
        <p class="contact-kicker" id="phone-label-el"></p>
        <p class="contact-val" id="contact-phone-el"></p>
      </div>
    </div>
    <p class="rsvp-note" id="rsvp-note-el"></p>
    <div class="rule" style="margin-bottom:0"><div class="rule-diamond"></div></div>
  </div>

  <footer class="footer reveal" style="animation-delay:0.42s">
    <div class="footer-school">
      <div class="footer-crest">
        <img id="footer-logo" src="" alt="">
      </div>
      <div class="footer-school-text">
        <p id="footer-school-name"></p>
        <p id="footer-school-city"></p>
      </div>
    </div>
    <div class="footer-credit" id="footer-credit"></div>
  </footer>

</div>

<script>
const C = CONFIG;
let currentLang = 'en';

function logoFallback(el, short) {
  el.onerror = function() {
    const span = document.createElement('span');
    span.style.cssText = 'font-family:Tenor Sans,sans-serif;font-size:11px;letter-spacing:2px;color:#4aaee0';
    span.textContent = short;
    el.parentNode.replaceChild(span, el);
  };
}

const logo = document.getElementById('school-logo');
logo.src = C.schoolLogoSrc;
logoFallback(logo, C.schoolShortName);

const footerLogo = document.getElementById('footer-logo');
footerLogo.src = C.schoolLogoSrc;
logoFallback(footerLogo, C.schoolShortName.slice(0,2));

const videoEl = document.getElementById('grad-video');
if (C.videoSrc) {
  videoEl.src = C.videoSrc;
} else {
  document.getElementById('video-section').style.display = 'none';
}

document.getElementById('contact-email-el').textContent = C.contactEmail;
document.getElementById('contact-phone-el').textContent = C.contactPhone;

function applyTranslation(lang) {
  const t = TRANSLATIONS[lang];
  const html = document.documentElement;

  // Fade effect
  document.body.classList.add('translating');
  setTimeout(() => document.body.classList.remove('translating'), 280);

  html.lang = lang;
  html.dir  = lang === 'ar' ? 'rtl' : 'ltr';

  document.getElementById('school-name-el').textContent   = t.schoolName;
  document.getElementById('presents-el').textContent      = t.presents;
  document.getElementById('event-title-el').textContent   = t.eventTitle;
  document.getElementById('event-year-el').textContent    = t.eventYear;
  document.getElementById('grades-line-el').textContent   = t.grades;
  document.getElementById('invite-body-el').textContent   = t.inviteBody;
  document.getElementById('video-label-el').textContent   = t.videoLabel;
  document.getElementById('date-label-el').textContent    = t.dateLabel;
  document.getElementById('val-date').textContent         = t.dateVal;
  document.getElementById('time-label-el').textContent    = t.timeLabel;
  document.getElementById('val-time').textContent         = t.timeVal;
  document.getElementById('val-doors').textContent        = t.doorsOpen;
  document.getElementById('attire-label-el').textContent  = t.attireLabel;
  document.getElementById('attire-val-el').textContent    = t.attireVal;
  document.getElementById('attire-sub-el').textContent    = t.attireSub;
  document.getElementById('venue-label-el').textContent   = t.venueLabel;
  document.getElementById('venue-name-el').textContent    = t.venueName;
  document.getElementById('venue-addr-el').textContent    = t.venueAddr;
  document.getElementById('maps-link').textContent        = t.mapsLink;
  document.getElementById('rsvp-heading-el').textContent  = t.rsvpHeading;
  document.getElementById('rsvp-body-el').textContent     = t.rsvpBody;
  document.getElementById('email-label-el').textContent   = t.emailLabel;
  document.getElementById('phone-label-el').textContent   = t.phoneLabel;
  document.getElementById('rsvp-note-el').innerHTML       = t.rsvpNote;
  document.getElementById('footer-school-name').textContent = t.schoolName;
  document.getElementById('footer-school-city').textContent = t.schoolCity;
  document.getElementById('lang-btn-text').textContent    = t.toggleBtn;

  document.getElementById('footer-credit').innerHTML = t.credits
    .map(p => `${p.name} · <span style="color:#4aaee0">${p.role}</span>`)
    .join('<br>');
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'ar' : 'en';
  applyTranslation(currentLang);
}

// Initial render
applyTranslation('en');
</script>
</body>
</html>
